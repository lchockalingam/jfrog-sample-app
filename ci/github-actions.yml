name: JFrog Platform Trial — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JFROG_INSTANCE: ${{ secrets.JFROG_INSTANCE }}       # e.g. mycompany.jfrog.io
  JFROG_USER: ${{ secrets.JFROG_USER }}
  JFROG_API_KEY: ${{ secrets.JFROG_API_KEY }}
  NPM_REPO: npm-local                                   # your Artifactory npm repo name
  DOCKER_REPO: docker-local                             # your Artifactory Docker repo name
  IMAGE_NAME: jfrog-sample-app

jobs:
  # ── 1. Install & Test ───────────────────────────────────────────────────────
  test:
    name: Install from Artifactory & Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: latest
        env:
          JF_URL: https://${{ env.JFROG_INSTANCE }}/
          JF_USER: ${{ env.JFROG_USER }}
          JF_PASSWORD: ${{ env.JFROG_API_KEY }}

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure npm to use JFrog Artifactory
        run: |
          jf npmc --repo-resolve ${{ env.NPM_REPO }}

      - name: Install dependencies via Artifactory
        working-directory: app
        run: jf npm install

      - name: Run tests
        working-directory: app
        run: npm test

      - name: Publish build info to Artifactory
        run: jf rt bp jfrog-sample-app ${{ github.run_number }}

  # ── 2. Xray Security Scan ───────────────────────────────────────────────────
  xray-scan:
    name: Xray Vulnerability & License Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://${{ env.JFROG_INSTANCE }}/
          JF_USER: ${{ env.JFROG_USER }}
          JF_PASSWORD: ${{ env.JFROG_API_KEY }}

      - name: Xray audit (npm)
        working-directory: app
        run: jf audit --npm --fail=true

      - name: Xray audit (pip)
        working-directory: app
        run: jf audit --pip --fail=false   # set to true to block on Python vulns

  # ── 3. Docker Build & Push ──────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image to Artifactory
    runs-on: ubuntu-latest
    needs: xray-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://${{ env.JFROG_INSTANCE }}/
          JF_USER: ${{ env.JFROG_USER }}
          JF_PASSWORD: ${{ env.JFROG_API_KEY }}

      - name: Authenticate Docker with Artifactory
        run: |
          echo "${{ env.JFROG_API_KEY }}" | docker login \
            ${{ env.JFROG_INSTANCE }} \
            --username ${{ env.JFROG_USER }} \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t ${{ env.JFROG_INSTANCE }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ github.run_number }} \
            -t ${{ env.JFROG_INSTANCE }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push to Artifactory Docker registry
        run: |
          jf docker push ${{ env.JFROG_INSTANCE }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}

      - name: Xray scan Docker image
        run: |
          jf docker scan ${{ env.JFROG_INSTANCE }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}

      - name: Publish Docker build info
        run: jf rt bp jfrog-sample-app-docker ${{ github.run_number }}
